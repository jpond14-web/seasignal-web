<!--
  OG Image placeholder (1200x630).
  NOTE: SVG OG images are not universally supported by social platforms.
  For production, convert this to a PNG file (og-image.png) and update
  the metadata references in src/app/layout.tsx accordingly.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Navy background -->
  <rect width="1200" height="630" fill="#020617" />

  <!-- Subtle radial glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Anchor icon -->
  <g transform="translate(600, 220)" fill="none" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ring at top -->
    <circle cx="0" cy="-50" r="14" />
    <!-- Vertical shaft -->
    <line x1="0" y1="-36" x2="0" y2="40" />
    <!-- Crossbar -->
    <line x1="-24" y1="-10" x2="24" y2="-10" />
    <!-- Left fluke -->
    <path d="M-40,40 C-40,10 0,10 0,40" />
    <!-- Right fluke -->
    <path d="M40,40 C40,10 0,10 0,40" />
  </g>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#f1f5f9">
    SeaSignal
  </text>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#14b8a6">
    Professional Network for Seafarers
  </text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#64748b">
    Privacy-first. No employer access. Built for seafarers.
  </text>

  <!-- Bottom accent line -->
  <rect x="400" y="580" width="400" height="2" rx="1" fill="#14b8a6" opacity="0.4" />
</svg>
