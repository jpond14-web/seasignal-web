<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0EA5E9">
  <title>Offline - SeaSignal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background-color: #0B1426;
      color: #F1F5F9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #0EA5E9;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #94A3B8;
      margin-bottom: 2rem;
    }
    button {
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="22" r="8" fill="none" stroke="#0EA5E9" stroke-width="4"/>
      <line x1="50" y1="30" x2="50" y2="82" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round"/>
      <line x1="32" y1="55" x2="68" y2="55" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round"/>
      <path d="M24 78 C24 60 50 50 50 82 C50 50 76 60 76 78" fill="none" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round"/>
    </svg>
    <h1>You're offline</h1>
    <p>SeaSignal will reconnect when your internet is back. Your data is safe and any pending changes will sync automatically.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
